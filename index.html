<!DOCTYPE html>
<html>
    <head>
        <h1 class="cookieCounter"><span id="totalCookies">0 Foxes</span></h1>
    </head>
    <body>
        <button onclick="cookieClick()">
            <img class="Fox Image" src="/image.png">
        </button>
    </body>
    <script>
        var cookies=0;
        var cookieIncrease=1;
        function cookieClick() {
            cookies += cookieIncrease;
            document.getElementById("totalCookies").innerHTML=cookies + " Foxes";
        }
    </script>
    <style>
        body {
            background-color: rgb(95, 93, 93);
        }
        .Cookie Image {
            Width: 100px;
            Height: 100px;
            size: 100px;
        }
    </style>
</html>
