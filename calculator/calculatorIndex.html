<html>
    <head>
        <script>
            function insert(num) {
                document.form.textview.value = document.form.textview.value+num
            }

            function equal() {
                var exp = document.form.textview.value;
                if(exp) {
                    document.form.textview.value = eval(exp)
                }
            }

            function clean() {
                document.form.textview.value = "";
            }

            function back() {
                var exp = document.form.textview.value;
                document.form.textview.value = exp.substring(0,exp.length-1);
            }


        </script>
        <style>
            *{
                margin: 0px;
                padding: 0px;
            }
            .button {
                width: 50px;
                height: 50px;
                font-size: 1.3em;
                margin: 2px;
                cursor: pointer;
                border: none;
                color: white;
                background: rgb(160, 153, 153)
                
            }

            .textview {
                width: 217px;
                margin: 5px;
                font-size: 1.3em;
                padding: 5px;
                border: none;
                background-color: rgb(255, 255, 255);
            }

            .main {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translateX(-50%) translateY(-50%);
            }
            
            .bg {
                background-image: linear-gradient(to bottom right,red, rgb(218, 218, 37));
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div class="bg"><div><a class="link" style="font-size:1.5em; text-align: left; padding-left: 5px; padding-top: 10px; color: rgb(2, 255, 255); font: arial; text-decoration: red;" href="../index.html">< Back</a></div></div>
        
        <div class="main">
            <form name="form">
                <input class="textview" name="textview">
            </form>
            <table>
                <tr>
                    <td><input class="button" type="button" value="C" onclick="clean()"></td>
                    <td><input class="button" type="button" value="<" onclick="back()"></td>
                    <td><input class="button" type="button" value="/" onclick="insert('/')"></td>
                    <td><input class="button" type="button" value="x" onclick="insert('x')"></td>
                </tr>
                <tr>
                    <td><input class="button" type="button" value="1" onclick="insert(1)"></td>
                    <td><input class="button" type="button" value="2" onclick="insert(2)"></td>
                    <td><input class="button" type="button" value="3" onclick="insert(3)"></td>
                    <td><input class="button" type="button" value="-" onclick="insert('-')"></td>
                </tr>
                <tr>
                    <td><input class="button" type="button" value="4" onclick="insert(4)"></td>
                    <td><input class="button" type="button" value="5" onclick="insert(5)"></td>
                    <td><input class="button" type="button" value="6" onclick="insert(6)"></td>
                    <td><input class="button" type="button" value="+" onclick="insert('+')"></td>
                </tr>
                <tr>
                    <td><input class="button" type="button" value="7" onclick="insert(7)"></td>
                    <td><input class="button" type="button" value="8" onclick="insert(8)"></td>
                    <td><input class="button" type="button" value="9" onclick="insert(9)"></td>
                    <td rowspan=5><input class="button" style="height: 106" type="button" value="=" onclick="equal()"></td>
                </tr>
                <tr>                   
                    <td colspan=2><input class="button" style="width: 106"type="button" value="0" onclick="insert(0)"></td>                   
                    <td><input class="button" type="button" value="." onclick="insert('.')"></td>
                </tr>
            </table>
        </div>
    </body>
</html>
